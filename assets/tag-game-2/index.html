<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tag Game</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #87ceeb; }
      canvas { position: fixed; top: 0; left: 0; }
      #mode-name {
        position: fixed;
        top: 16px;
        left: 16px;
        color: white;
        font-family: monospace;
        font-size: 14px;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        z-index: 10;
      }
      #round-timer {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 3rem;
        font-weight: bold;
        color: white;
        text-shadow: 0 0 8px #000, 0 0 16px #000;
        pointer-events: none;
        z-index: 10;
      }
      #mode-status {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        color: #ffff88;
        font-family: monospace;
        font-size: 16px;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        text-align: center;
        z-index: 10;
      }
      #coords {
        position: fixed;
        bottom: 16px;
        left: 16px;
        color: rgba(255,255,255,0.8);
        font-family: monospace;
        font-size: 13px;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        z-index: 10;
      }
      #transition-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 3rem;
        font-weight: bold;
        z-index: 100;
        text-align: center;
        font-family: monospace;
        text-shadow: 0 0 12px #000;
      }
      #controls {
        position: fixed;
        bottom: 16px;
        right: 16px;
        color: rgba(255,255,255,0.6);
        font-family: monospace;
        font-size: 12px;
        pointer-events: none;
        line-height: 1.8;
        z-index: 10;
        text-align: right;
      }
      #login-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.88);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 200;
        font-family: monospace;
      }
      #login-box {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 36px 44px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        min-width: 320px;
      }
      #login-box h1 {
        color: #fff;
        font-size: 2rem;
        margin: 0;
        letter-spacing: 2px;
      }
      #login-box p {
        color: #8b949e;
        font-size: 0.85rem;
        margin: 0;
        text-align: center;
      }
      #nickname-input {
        width: 100%;
        padding: 10px 14px;
        font-family: monospace;
        font-size: 1rem;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e6edf3;
        outline: none;
        box-sizing: border-box;
        text-align: center;
        letter-spacing: 1px;
      }
      #nickname-input:focus { border-color: #58a6ff; }
      #nickname-submit {
        width: 100%;
        padding: 10px;
        font-family: monospace;
        font-size: 1rem;
        font-weight: bold;
        background: #238636;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: background 0.15s;
      }
      #nickname-submit:hover { background: #2ea043; }
      #nickname-submit:disabled { background: #21262d; color: #484f58; cursor: default; }
      #login-error {
        color: #f85149;
        font-size: 0.8rem;
        min-height: 1em;
      }
      #crosshair {
        position: fixed; top: 50%; left: 50%;
        pointer-events: none; z-index: 10; display: none;
        color: rgba(255,255,255,0.9);
      }
      #crosshair > div {
        position: absolute;
        background: currentColor;
        box-shadow: 0 0 3px rgba(0,0,0,0.9);
        border-radius: 1px;
      }
      .ch-l   { width: 7px; height: 2px; top: -1px; right:  4px; }
      .ch-r   { width: 7px; height: 2px; top: -1px; left:   4px; }
      .ch-u   { width: 2px; height: 7px; left: -1px; bottom: 4px; }
      .ch-d   { width: 2px; height: 7px; left: -1px; top:    4px; }
      .ch-dot { width: 2px; height: 2px; top: -1px;  left:  -1px; }
    </style>
    <script defer src="./tag-game-2.js"></script>
  </head>
  <body>
    <div id="login-overlay">
      <div id="login-box">
        <h1>TAG GAME</h1>
        <p>Enter a nickname to play.<br>It will appear above your character.</p>
        <div id="room-code" style="
          display:none;
          width:100%;padding:7px 10px;font-family:monospace;font-size:0.7rem;
          color:#58a6ff;background:#161b22;border:1px solid #30363d;border-radius:6px;
          text-align:center;cursor:pointer;letter-spacing:0.5px;word-break:break-all;
        " title="Click to copy link">Loading room…</div>
        <input id="nickname-input" type="text" maxlength="16" placeholder="Your nickname" autocomplete="off" spellcheck="false" />
        <div id="login-error"></div>
        <button id="nickname-submit">JOIN</button>
      </div>
    </div>
    <div id="mode-name">Tag</div>
    <div id="update-bar" style="
      position:fixed; top:36px; left:16px;
      font-family:monospace; font-size:11px; letter-spacing:0.5px;
      color:rgba(255,255,255,0.5); text-shadow:0 0 4px #000;
      background:rgba(0,0,0,0.38); border:1px solid rgba(255,255,255,0.12);
      border-radius:4px; padding:2px 7px; pointer-events:none; z-index:10;
    ">UPDATE 24 &middot; Haunted Lamp Brightness +45%</div>
    <div id="round-timer">60</div>
    <div id="mode-status"></div>
    <div id="coords"></div>
    <div id="transition-overlay"></div>
    <div id="flash-overlay" style="position:fixed;inset:0;background:#ffffff;opacity:0;pointer-events:none;z-index:200;transition:opacity 0.05s;"></div>
    <button id="admin-btn" style="display:none;position:fixed;top:16px;right:16px;z-index:150;padding:5px 12px;font-family:monospace;font-size:0.75rem;background:#2a2a00;color:#ffcc00;border:2px solid #ffcc00;border-radius:4px;cursor:pointer;letter-spacing:1px;text-shadow:0 0 6px #ffcc00;">⚙ ADMIN</button>
    <div id="admin-panel" style="display:none;position:fixed;top:46px;right:16px;z-index:150;background:#0d1117;border:1px solid #444;border-radius:8px;padding:14px 18px;font-family:monospace;color:#ccc;min-width:220px;"></div>
    <!-- Minimap -->
    <canvas id="minimap" style="
      display:none; position:fixed; top:56px; right:16px;
      width:150px; height:150px; border-radius:8px;
      border:1px solid rgba(255,255,255,0.18);
      pointer-events:none; z-index:10;
    "></canvas>
    <div id="net-status" style="position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(40px);font-family:monospace;font-size:11px;color:#aaa;text-shadow:0 0 4px #000;pointer-events:none;z-index:10;"></div>
    <div id="controls">WASD — Move &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Mouse — Camera &nbsp;|&nbsp; 1-4 — Weapon &nbsp;|&nbsp; LClick — Fire</div>
    <div id="tmf-hud" style="
      display:none;
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.65); border:1px solid rgba(255,255,255,0.15);
      border-radius:10px; padding:10px 18px; pointer-events:none; z-index:10;
      font-family:monospace; text-align:center; min-width:200px;
    ">
      <div id="tmf-lives" style="font-size:1.3rem;margin-bottom:6px;letter-spacing:3px;"></div>
      <div style="background:#333;border-radius:4px;height:12px;width:180px;overflow:hidden;">
        <div id="tmf-hp-bar" style="height:100%;width:100%;background:#44ff44;border-radius:4px;transition:width 0.1s,background 0.2s;"></div>
      </div>
      <div id="tmf-hp-text" style="font-size:0.7rem;color:#aaa;margin-top:3px;"></div>
    </div>
    <div id="sprint-bar-wrap" style="
      position:fixed; bottom:44px; left:50%; transform:translateX(-50%);
      width:120px; height:4px; background:rgba(0,0,0,0.45);
      border-radius:2px; pointer-events:none; z-index:10; opacity:0;
      transition:opacity 0.3s;
    ">
      <div id="sprint-bar" style="
        height:100%; width:100%; background:#44ff88;
        border-radius:2px; transition:width 0.05s, background 0.2s;
      "></div>
    </div>
    <div id="crosshair">
      <div class="ch-l"></div>
      <div class="ch-r"></div>
      <div class="ch-u"></div>
      <div class="ch-d"></div>
      <div class="ch-dot"></div>
    </div>
    <div id="weapon-hud" style="
      position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
      display:flex; gap:8px; pointer-events:none; z-index:10;
    "></div>
    <!-- Haunted class picker (shown at round start for the IT player) -->
    <div id="haunted-picker" style="
      display:none; position:fixed; inset:0; z-index:80;
      background:rgba(0,0,0,0.72);
      flex-direction:column; align-items:center; justify-content:center;
      font-family:monospace; pointer-events:none;
    ">
      <div style="pointer-events:auto; text-align:center; max-width:560px; width:100%; padding:0 14px;">
        <div style="color:#ff8800;font-size:1.5rem;font-weight:bold;letter-spacing:2px;text-shadow:0 0 10px #ff5500;">
          CHOOSE YOUR KILLER TYPE
        </div>
        <div id="haunted-picker-timer" style="color:#ffaa44;font-size:0.9rem;margin:6px 0 16px;"></div>
        <div id="haunted-picker-buttons" style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;"></div>
      </div>
    </div>
    <!-- Zombie class picker (shown during infection respawn countdown) -->
    <div id="zombie-picker" style="
      display:none; position:fixed; inset:0; z-index:80;
      background:rgba(0,0,0,0.72);
      flex-direction:column; align-items:center; justify-content:center;
      font-family:monospace; pointer-events:none;
    ">
      <div style="pointer-events:auto; text-align:center; max-width:580px; width:100%; padding:0 14px;">
        <div style="color:#ff4400;font-size:1.5rem;font-weight:bold;letter-spacing:2px;text-shadow:0 0 10px #ff2200;">
          CHOOSE YOUR ZOMBIE TYPE
        </div>
        <div id="zombie-picker-timer" style="color:#ffaa44;font-size:0.9rem;margin:6px 0 14px;"></div>
        <div id="zombie-picker-buttons" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;"></div>
      </div>
    </div>
  </body>
</html>
