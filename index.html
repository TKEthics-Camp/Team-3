<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gongxing Academy - 智能学习系统</title>
    <style>
        :root {
            --primary: #4e8cff;
            --primary-hover: #3b73d4;
            --english-theme: #8b5cf6;
            --english-hover: #7c3aed;
            --science-theme: #10b981;
            --success: #10b981;
            --error: #ef4444;
            --bg-page: #0f1115;
            --bg-card: #181a20;
            --bg-input: #23262f;
            --border: #2e323a;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --radius: 12px;
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 760px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
            overflow: hidden;
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .theme-en .header h1 { color: var(--english-theme); }
        .theme-sci .header h1 { color: var(--science-theme); }

        .header h1 span { font-size: 1.2rem; color: var(--text-muted); font-weight: normal; margin-left: 10px; }
        .header h1:hover span { color: var(--text-main); }

        .lang-toggle {
            display: flex;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 4px;
        }

        .lang-toggle button {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        .lang-toggle button.active { background: var(--primary); color: #fff; }
        .theme-en .lang-toggle button.active { background: var(--english-theme); }
        .theme-sci .lang-toggle button.active { background: var(--science-theme); }

        /* ========= 数据大屏 & 勋章 ========= */
        .dashboard {
            background: linear-gradient(145deg, #1e222d, #181a20);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease;
        }
        .dash-stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 15px;
        }
        .stat-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .dash-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }
        .badge {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }
        .badge.rank { background: rgba(78, 140, 255, 0.1); color: #4e8cff; border-color: rgba(78, 140, 255, 0.3); }

        /* 主页卡片 */
        .home-cards { display: flex; gap: 20px; margin-top: 20px; }
        .subject-card {
            flex: 1; padding: 40px 10px; text-align: center; border-radius: var(--radius);
            background: var(--bg-input); border: 2px solid transparent; cursor: pointer;
            transition: 0.3s; display: flex; flex-direction: column; gap: 15px;
        }
        .subject-card:hover { transform: translateY(-5px); }
        .subject-card.math:hover { border-color: var(--primary); box-shadow: 0 10px 30px rgba(78, 140, 255, 0.15); }
        .subject-card.english:hover { border-color: var(--english-theme); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.15); }
        .subject-card.science:hover { border-color: var(--science-theme); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.15); }
        .subject-card .icon { font-size: 2.8rem; }
        .subject-card .title { font-size: 1.3rem; font-weight: bold; }

        .setup-area { display: flex; gap: 15px; margin-bottom: 30px; animation: fadeIn 0.4s; }

        select {
            flex: 1; padding: 14px 16px; border-radius: 8px; background: var(--bg-input);
            color: var(--text-main); border: 1px solid var(--border); font-size: 1.1rem;
            outline: none; cursor: pointer;
        }
        select:focus { border-color: var(--primary); }
        .theme-en select:focus { border-color: var(--english-theme); }
        .theme-sci select:focus { border-color: var(--science-theme); }

        .btn {
            background: var(--primary); color: white; border: none; padding: 14px 30px;
            border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .theme-en .btn { background: var(--english-theme); }
        .theme-sci .btn { background: var(--science-theme); }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover:not(:disabled) { background: var(--bg-input); }

        .progress-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--border); transition: 0.3s; }
        .dot.active { background: var(--primary); transform: scale(1.2); }
        .theme-en .dot.active { background: var(--english-theme); }
        .theme-sci .dot.active { background: var(--science-theme); }
        .dot.correct { background: var(--success); }
        .dot.wrong { background: var(--error); }

        .quiz-box {
            background: var(--bg-input); border: 2px solid transparent; border-radius: var(--radius);
            padding: 40px; text-align: center; transition: 0.4s; animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .quiz-box.state-correct { border-color: var(--success); background: rgba(16, 185, 129, 0.05); }
        .quiz-box.state-wrong { border-color: var(--error); background: rgba(239, 68, 68, 0.05); }

        .reading-text {
            font-size: 1.1rem; line-height: 1.6; text-align: left; background: var(--bg-card);
            padding: 20px; border-radius: 8px; margin-bottom: 25px; color: #d1d5db;
            border-left: 4px solid var(--english-theme);
        }

        .q-text { font-size: 1.6rem; font-weight: 500; margin-bottom: 30px; line-height: 1.4; }
        .q-sub { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 20px; }

        input[type="number"] {
            width: 280px; padding: 16px; font-size: 1.5rem; text-align: center; border-radius: 8px;
            background: var(--bg-card); border: 2px solid var(--border); color: var(--text-main);
            outline: none; transition: 0.3s; margin: 0 auto; display: block;
        }
        input[type="number"]:focus { border-color: var(--primary); }

        .mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .mc-btn {
            background: var(--bg-card); border: 2px solid var(--border); color: var(--text-main);
            padding: 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
            text-align: center; line-height: 1.4;
        }
        .theme-en .mc-btn:hover:not(:disabled) { border-color: var(--english-theme); background: rgba(139, 92, 246, 0.1); }
        .theme-en .mc-btn.selected { border-color: var(--english-theme); background: var(--english-theme); color: white; }
        
        .theme-sci .mc-btn:hover:not(:disabled) { border-color: var(--science-theme); background: rgba(16, 185, 129, 0.1); }
        .theme-sci .mc-btn.selected { border-color: var(--science-theme); background: var(--science-theme); color: white; }
        
        .mc-btn.ans-correct { border-color: var(--success); background: var(--success); color: white; }
        .mc-btn.ans-wrong { border-color: var(--error); background: var(--error); color: white; }
        .mc-btn.ans-missed { border-color: var(--success); background: transparent; color: var(--success); border-style: dashed; }

        .feedback { font-size: 1.1rem; font-weight: 600; min-height: 24px; margin-top: 20px; }
        .fc-correct { color: var(--success); }
        .fc-wrong { color: var(--error); }

        .nav-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }

        .score-board {
            display: none; text-align: center; padding: 20px; border-radius: var(--radius);
            border: 1px solid; font-size: 1.4rem; font-weight: bold; margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .home-cards { flex-direction: column; }
            .setup-area { flex-direction: column; }
            .mc-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <h1 onclick="goHome()">
            ⚡ Gongxing Academy <span id="headerSub"></span>
        </h1>
        <div class="lang-toggle">
            <button id="langEn" onclick="setLang('en')">EN</button>
            <button id="langZh" class="active" onclick="setLang('zh')">中文</button>
        </div>
    </div>

    <!-- 主页视图 -->
    <div id="homeView">
        
        <!-- 数据大屏 -->
        <div class="dashboard" id="dashboardUI">
            <div class="dash-stats">
                <div class="stat-box">
                    <span class="stat-value" id="dashToday">0</span>
                    <span class="stat-label" id="lblToday">今日已刷(题)</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="dashAcc">0%</span>
                    <span class="stat-label" id="lblAcc">平均正确率</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" style="color: #f59e0b;" id="dashStreak">0</span>
                    <span class="stat-label" id="lblStreak">连续打卡(天) 🔥</span>
                </div>
            </div>
            <div class="dash-badges" id="dashBadges">
                <!-- 动态注入勋章 -->
            </div>
        </div>

        <h2 style="text-align:center; font-weight: 500; margin-bottom: 10px;" id="homeTitle">请选择测试科目</h2>
        <div class="home-cards">
            <div class="subject-card math" onclick="selectSubject('math')">
                <div class="icon">📐</div>
                <div class="title" id="cardMath">数学 (Math)</div>
            </div>
            <div class="subject-card english" onclick="selectSubject('english')">
                <div class="icon">📝</div>
                <div class="title" id="cardEnglish">英语 (English)</div>
            </div>
            <div class="subject-card science" onclick="selectSubject('science')">
                <div class="icon">🔬</div>
                <div class="title" id="cardScience">科学 (Science)</div>
            </div>
        </div>
    </div>

    <!-- 设置视图 -->
    <div id="setupView" style="display: none;">
        <div class="setup-area">
            <select id="levelSelect"></select>
            <button class="btn" id="startBtn" onclick="startQuiz()">开始刷题</button>
        </div>
    </div>

    <!-- 测试视图 -->
    <div id="quizView" style="display: none;">
        <div id="scoreBoard" class="score-board"></div>
        <div class="progress-dots" id="dots"></div>
        <div id="quizContainer"></div>
        
        <div class="nav-buttons">
            <button class="btn btn-outline" id="prevBtn" onclick="nav(-1)">上一题</button>
            <button class="btn" id="nextBtn" onclick="nav(1)">下一题</button>
            <button class="btn" style="background: var(--success); display: none;" id="submitBtn" onclick="submitQuiz()">提交批改</button>
        </div>
    </div>
</div>

<script>
    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
    const EPS = 0.001;
    const TOTAL = 10; // 每次刷题数量

    let lang = 'zh';
    let subject = 'none'; // 'math', 'english', 'science'
    let questions = [], answers = [], current = 0, isGraded = false;

    // ----------------- 多语言配置 -----------------
    const I18N = {
        en: {
            homeTitle: 'Select Subject', mathTitle: 'Mathematics', engTitle: 'English', sciTitle: 'Science',
            start: 'Start Quiz', prev: 'Previous', next: 'Next', submit: 'Submit & Grade',
            placeholder: 'Enter answer', correct: '✔️ Correct!',
            wrong: (ans) => `❌ Wrong. Correct answer: ${ans}`,
            empty: (ans) => `⚠️ No answer. Correct answer: ${ans}`,
            score: (c, t) => `Quiz Completed! Score: ${c} / ${t} 🔥 Stats Saved!`,
            mathGrades: ['G1', 'G2', 'G3', 'G4', 'G5', 'G6', 'G7', 'G8', 'G9', 'G10', 'G11', 'G12'],
            sciGrades: ['G1 (Life Sci Basics)', 'G2', 'G3', 'G4', 'G5 (Matter & Chem)', 'G6', 'G7', 'G8 (Genetics & Physics)', 'G9', 'G10', 'G11', 'G12 (Advanced Sci)'],
            engLevels: Array.from({length: 25}, (_, i) => `Lexile ${(i+1)*100}L`),
            types: { meaning: 'What is the meaning of this word?', synonym: 'Choose the closest synonym.', grammar: 'Choose the correct word.', reading: 'Read the text and answer.', sci: 'Choose the correct answer:' }
        },
        zh: {
            homeTitle: '请选择测试科目', mathTitle: '数学 (Math)', engTitle: '英语 (English)', sciTitle: '科学 (Science)',
            start: '开始测试', prev: '上一题', next: '下一题', submit: '提交批改',
            placeholder: '输入答案', correct: '✔️ 回答正确！',
            wrong: (ans) => `❌ 回答错误。正确答案：${ans}`,
            empty: (ans) => `⚠️ 未作答。正确答案：${ans}`,
            score: (c, t) => `测试完成！答对 ${c} 题，共 ${t} 题 🔥 数据已保存！`,
            mathGrades: ['一年级', '二年级', '三年级', '四年级', '五年级', '六年级', '七年级', '八年级', '九年级', '高一', '高二', '高三'],
            sciGrades: ['一年级 (基础动植物)', '二年级', '三年级', '四年级', '五年级 (物质与初阶物理)', '六年级', '七年级', '八年级 (遗传与化学反应)', '九年级', '十年级', '十一年级', '十二年级 (进阶生化与物理)'],
            engLevels: Array.from({length: 25}, (_, i) => `Lexile ${(i+1)*100}L`),
            types: { meaning: '选出下列单词的正确词义：', synonym: '选出与该词最接近的近义词：', grammar: '选择正确的选项填空：', reading: '阅读理解：根据短文回答问题。', sci: '选择正确的答案：' }
        }
    };

    // ----------------- 题库生成器 -----------------
    const MATH_BANK = [
        [ () => ({ t:{en:"1 + 1 = ?", zh:"1 + 1 = ？"}, type: 'num', a: 2 }), () => ({ t:{en:"5 - 2 = ?", zh:"5 - 2 = ？"}, type: 'num', a: 3 }) ], // 示例占位，保持原样即可
        [ () => ({ t:{en:"2 × 3 = ?", zh:"2 × 3 = ？"}, type: 'num', a: 6 }), () => ({ t:{en:"8 ÷ 2 = ?", zh:"8 ÷ 2 = ？"}, type: 'num', a: 4 }) ]
        // 为缩减代码长度省略中间年级... 逻辑按你原版的保留即可。这里用2组代表演示。
    ];
    while(MATH_BANK.length < 12) MATH_BANK.push(MATH_BANK[1]); // 补齐12个年级防崩

    const SCIENCE_BANK = [
        [ { t:{en:"Which is a plant?", zh:"哪个是植物？"}, opts:["Dog", "Tree", "Cat", "Bird"], a: 1 } ],
        [ { t:{en:"Water formula?", zh:"水的化学式？"}, opts:["CO2", "H2O", "O2", "NaCl"], a: 1 } ],
        [ { t:{en:"Speed of light?", zh:"光速大约是多少 (m/s)？"}, opts:["300", "3x10^8", "1500", "9.8"], a: 1 } ]
    ];
    while(SCIENCE_BANK.length < 12) SCIENCE_BANK.push(SCIENCE_BANK[1]);

    const ENG_DATA = {
        vocab: [
            [{w: 'apple', zh: '苹果', syn: 'fruit'}, {w: 'happy', zh: '高兴的', syn: 'joyful'}],
            [{w: 'analyze', zh: '分析', syn: 'examine'}, {w: 'strategy', zh: '策略', syn: 'plan'}],
            [{w: 'ubiquitous', zh: '无所不在的', syn: 'omnipresent'}, {w: 'pragmatic', zh: '务实的', syn: 'practical'}]
        ],
        grammar: [
            [{q: "She ___ to school every day.", opts: ["go", "goes", "going", "gone"], ans: 1}, {q: "They ___ playing football now.", opts: ["is", "are", "am", "be"], ans: 1}],
            [{q: "If I ___ known, I would have helped.", opts: ["have", "had", "would", "has"], ans: 1}, {q: "The book ___ written by Mark.", opts: ["was", "is being", "has", "did"], ans: 0}],
            [{q: "Scarcely ___ the room when it started to rain.", opts: ["he had entered", "had he entered", "he entered", "did he enter"], ans: 1}]
        ],
        reading: [
            [{text: "The dog barks at the mailman.", q: "Who does the dog bark at?", opts: ["Cat", "Mailman", "Car", "Tree"], ans: 1}],
            [{text: "Global warming is melting the ice caps rapidly.", q: "What is melting?", opts: ["Iron", "Ice caps", "Plastic", "Glass"], ans: 1}],
            [{text: "Quantum entanglement implies a non-local connection.", q: "What kind of connection is implied?", opts: ["Local", "Non-local", "Broken", "Physical"], ans: 1}]
        ]
    };

    // ----------------- 用户数据与成就系统 (GAMIFICATION) -----------------
    let userData = {
        totalSolved: 0, totalCorrect: 0, todaySolved: 0,
        lastDate: '', streak: 0,
        mastery: { math: 0, english: 0, science: 0 }
    };

    function loadUserData() {
        const saved = localStorage.getItem('gongxing_academy_data');
        if(saved) userData = JSON.parse(saved);
        
        let today = new Date().toLocaleDateString();
        if(userData.lastDate !== today) {
            let yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if(userData.lastDate === yesterday.toLocaleDateString()) {
                // 昨天打过卡，连击还在
            } else if (userData.lastDate !== '') {
                userData.streak = 0; // 断签了
            }
            userData.todaySolved = 0; 
        }
        updateDashboardUI();
    }

    function saveAndCheckAchievements(correctCount, totalCount) {
        let today = new Date().toLocaleDateString();
        if(userData.lastDate !== today) {
            userData.streak += 1;
            userData.lastDate = today;
        }

        userData.todaySolved += totalCount;
        userData.totalSolved += totalCount;
        userData.totalCorrect += correctCount;
        userData.mastery[subject] += correctCount;

        localStorage.setItem('gongxing_academy_data', JSON.stringify(userData));
        updateDashboardUI();
    }

    function updateDashboardUI() {
        document.getElementById('dashToday').innerText = userData.todaySolved;
        let acc = userData.totalSolved === 0 ? 0 : Math.round((userData.totalCorrect / userData.totalSolved) * 100);
        document.getElementById('dashAcc').innerText = acc + '%';
        document.getElementById('dashStreak').innerText = userData.streak;

        // 解锁段位与称号
        let badgesHtml = '';
        // 1. 段位 Rank
        if(userData.totalSolved >= 200) badgesHtml += `<div class="badge rank">👑 传奇学神</div>`;
        else if(userData.totalSolved >= 100) badgesHtml += `<div class="badge rank">💎 钻石学霸</div>`;
        else if(userData.totalSolved >= 30) badgesHtml += `<div class="badge rank">🥇 黄金写手</div>`;
        else if(userData.totalSolved >= 10) badgesHtml += `<div class="badge rank">🥈 白银门徒</div>`;
        else badgesHtml += `<div class="badge rank">🥉 青铜萌新</div>`;

        // 2. 专科称号
        if(userData.mastery.science >= 20) badgesHtml += `<div class="badge">🌌 科学新星</div>`;
        if(userData.mastery.math >= 20) badgesHtml += `<div class="badge">📐 数学极客</div>`;
        if(userData.mastery.english >= 20) badgesHtml += `<div class="badge">📝 词汇达人</div>`;
        if(userData.streak >= 3) badgesHtml += `<div class="badge">🔥 坚持不懈</div>`;

        document.getElementById('dashBadges').innerHTML = badgesHtml;
    }

    // 初始化加载数据
    loadUserData();


    // ----------------- 核心交互逻辑 -----------------
    function setLang(l) {
        lang = l;
        document.getElementById('langEn').className = (l === 'en') ? 'active' : '';
        document.getElementById('langZh').className = (l === 'zh') ? 'active' : '';
        
        document.getElementById('homeTitle').innerText = I18N[lang].homeTitle;
        document.getElementById('cardMath').innerText = I18N[lang].mathTitle;
        document.getElementById('cardEnglish').innerText = I18N[lang].engTitle;
        document.getElementById('cardScience').innerText = I18N[lang].sciTitle;
        document.getElementById('startBtn').innerText = I18N[lang].start;
        document.getElementById('prevBtn').innerText = I18N[lang].prev;
        document.getElementById('nextBtn').innerText = I18N[lang].next;
        document.getElementById('submitBtn').innerText = I18N[lang].submit;
        
        document.getElementById('lblToday').innerText = l === 'zh' ? '今日已刷(题)' : 'Today Solved';
        document.getElementById('lblAcc').innerText = l === 'zh' ? '平均正确率' : 'Avg Accuracy';
        document.getElementById('lblStreak').innerText = l === 'zh' ? '连续打卡(天) 🔥' : 'Streak 🔥';

        if(subject !== 'none' && !isGraded && questions.length === 0) populateSelect();
        if(questions.length > 0) renderQuiz();
    }

    function goHome() {
        document.getElementById('homeView').style.display = 'block';
        document.getElementById('setupView').style.display = 'none';
        document.getElementById('quizView').style.display = 'none';
        document.getElementById('headerSub').innerText = '';
        document.body.className = '';
        subject = 'none';
        questions = [];
        updateDashboardUI(); // 返回主页刷新大屏
    }

    function selectSubject(sub) {
        subject = sub;
        document.body.className = `theme-${sub === 'english' ? 'en' : (sub === 'science' ? 'sci' : 'math')}`;
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('setupView').style.display = 'block';
        document.getElementById('headerSub').innerText = `> ${I18N[lang][sub === 'math' ? 'mathTitle' : (sub === 'english' ? 'engTitle' : 'sciTitle')]}`;
        populateSelect();
    }

    function populateSelect() {
        const sel = document.getElementById('levelSelect');
        sel.innerHTML = '';
        const opts = subject === 'math' ? I18N[lang].mathGrades : (subject === 'science' ? I18N[lang].sciGrades : I18N[lang].engLevels);
        opts.forEach((o, i) => {
            sel.innerHTML += `<option value="${i}">${o}</option>`;
        });
    }

    // ----------------- 组卷逻辑 -----------------
    function startQuiz() {
        const level = parseInt(document.getElementById('levelSelect').value);
        questions = [];
        answers = Array(TOTAL).fill(null);
        current = 0;
        isGraded = false;
        
        if (subject === 'math') {
            const bank = MATH_BANK[Math.min(level, MATH_BANK.length-1)];
            for(let i=0; i<TOTAL; i++) questions.push(bank[rand(0, bank.length-1)]());
        } 
        else if (subject === 'science') {
            const bank = SCIENCE_BANK[Math.min(level, SCIENCE_BANK.length-1)];
            for(let i=0; i<TOTAL; i++) {
                let q = bank[rand(0, bank.length-1)];
                let oArr = q.opts.map((text, idx) => ({text, isAns: idx === q.a}));
                oArr = shuffle(oArr);
                questions.push({
                    t: q.t, type: 'mc', opts: oArr.map(o=>o.text), a: oArr.findIndex(o=>o.isAns)
                });
            }
        }
        else if (subject === 'english') {
            let diff = level < 8 ? 0 : (level < 16 ? 1 : 2); // 25级映射到3个难度池
            let vBank = ENG_DATA.vocab[diff], gBank = ENG_DATA.grammar[diff], rBank = ENG_DATA.reading[diff];
            
            for(let i=0; i<TOTAL; i++) {
                let r = Math.random();
                if(r < 0.4) { // 词汇
                    let w = vBank[rand(0, vBank.length-1)];
                    let isSyn = Math.random() > 0.5;
                    let wrongOpts = vBank.filter(x => x.w !== w.w).sort(()=>Math.random()-0.5).slice(0,3);
                    let oArr = [{text: isSyn ? w.syn : w.zh, isAns: true}];
                    wrongOpts.forEach(x => oArr.push({text: isSyn ? x.syn : x.zh, isAns: false}));
                    oArr = shuffle(oArr);
                    questions.push({
                        q: w.w, type: isSyn ? 'synonym' : 'meaning',
                        opts: oArr.map(o=>o.text), a: oArr.findIndex(o=>o.isAns)
                    });
                } else if(r < 0.8) { // 语法
                    let g = gBank[rand(0, gBank.length-1)];
                    let oArr = g.opts.map((text, idx) => ({text, isAns: idx === g.ans}));
                    questions.push({
                        q: g.q, type: 'grammar', opts: oArr.map(o=>o.text), a: oArr.findIndex(o=>o.isAns)
                    });
                } else { // 阅读
                    let rd = rBank[rand(0, rBank.length-1)];
                    let oArr = rd.opts.map((text, idx) => ({text, isAns: idx === rd.ans}));
                    questions.push({
                        text: rd.text, q: rd.q, type: 'reading',
                        opts: oArr.map(o=>o.text), a: oArr.findIndex(o=>o.isAns)
                    });
                }
            }
        }

        document.getElementById('setupView').style.display = 'none';
        document.getElementById('quizView').style.display = 'block';
        document.getElementById('scoreBoard').style.display = 'none';
        
        let dotsHtml = '';
        for(let i=0; i<TOTAL; i++) dotsHtml += `<div class="dot" id="dot${i}" onclick="jump(${i})"></div>`;
        document.getElementById('dots').innerHTML = dotsHtml;
        
        renderQuiz();
    }

    function renderQuiz() {
        const q = questions[current];
        const ctn = document.getElementById('quizContainer');
        const isZh = lang === 'zh';
        
        document.querySelectorAll('.dot').forEach((d, i) => d.className = `dot ${i === current ? 'active' : ''} ${isGraded ? (isCorrect(i) ? 'correct' : 'wrong') : ''}`);
        
        document.getElementById('prevBtn').disabled = current === 0;
        
        if (isGraded) {
            document.getElementById('nextBtn').style.display = current === TOTAL - 1 ? 'none' : 'inline-block';
            document.getElementById('submitBtn').style.display = 'none';
        } else {
            document.getElementById('nextBtn').style.display = current === TOTAL - 1 ? 'none' : 'inline-block';
            document.getElementById('submitBtn').style.display = current === TOTAL - 1 ? 'inline-block' : 'none';
        }

        let html = '';
        // 渲染题目内容
        if (subject === 'math') {
            html += `<div class="q-text">${isZh ? q.t.zh : q.t.en}</div>`;
            html += `<input type="number" id="ansInput" placeholder="${I18N[lang].placeholder}" value="${answers[current] !== null ? answers[current] : ''}" oninput="saveAns(this.value)" ${isGraded ? 'disabled' : ''}>`;
        } 
        else if (subject === 'science') {
            html += `<div class="q-sub">${I18N[lang].types.sci}</div>`;
            html += `<div class="q-text">${isZh ? q.t.zh : q.t.en}</div>`;
            html += buildMC(q);
        }
        else if (subject === 'english') {
            html += `<div class="q-sub">${I18N[lang].types[q.type]}</div>`;
            if (q.type === 'reading') html += `<div class="reading-text">${q.text}</div>`;
            html += `<div class="q-text">${q.q}</div>`;
            html += buildMC(q);
        }

        // 渲染批改反馈
        if (isGraded) {
            let correct = isCorrect(current);
            let stateClass = correct ? 'state-correct' : 'state-wrong';
            let fcClass = correct ? 'fc-correct' : 'fc-wrong';
            let msg = '';
            
            if (subject === 'math') {
                if (answers[current] === null || answers[current] === '') msg = I18N[lang].empty(q.a);
                else msg = correct ? I18N[lang].correct : I18N[lang].wrong(q.a);
            } else {
                if (answers[current] === null) msg = I18N[lang].empty(q.opts[q.a]);
                else msg = correct ? I18N[lang].correct : I18N[lang].wrong(q.opts[q.a]);
            }
            
            html += `<div class="feedback ${fcClass}">${msg}</div>`;
            ctn.parentElement.className = `quiz-box ${stateClass}`;
        } else {
            ctn.parentElement.className = `quiz-box`;
        }

        ctn.innerHTML = html;
    }

    function buildMC(q) {
        let html = '<div class="mc-grid">';
        q.opts.forEach((o, i) => {
            let cls = 'mc-btn';
            if (answers[current] === i) cls += ' selected';
            if (isGraded) {
                if (i === q.a && answers[current] === i) cls += ' ans-correct';
                else if (answers[current] === i && i !== q.a) cls += ' ans-wrong';
                else if (i === q.a) cls += ' ans-missed';
            }
            html += `<button class="${cls}" onclick="saveAns(${i})" ${isGraded ? 'disabled' : ''}>${o}</button>`;
        });
        html += '</div>';
        return html;
    }

    function saveAns(val) {
        if(isGraded) return;
        answers[current] = subject === 'math' ? (val === '' ? null : parseFloat(val)) : val;
        renderQuiz();
    }

    function nav(dir) {
        current += dir;
        renderQuiz();
    }
    
    function jump(idx) {
        current = idx;
        renderQuiz();
    }

    function isCorrect(idx) {
        let ans = answers[idx], q = questions[idx];
        if (ans === null || ans === '') return false;
        if (subject === 'math') return Math.abs(ans - q.a) < EPS;
        return ans === q.a;
    }

    function submitQuiz() {
        if(!confirm(lang === 'zh' ? '确定要提交并批改吗？' : 'Are you sure to submit?')) return;
        isGraded = true;
        let score = 0;
        for(let i=0; i<TOTAL; i++) if(isCorrect(i)) score++;
        
        // 游戏化：保存数据并解锁成就
        saveAndCheckAchievements(score, TOTAL);

        const sb = document.getElementById('scoreBoard');
        sb.style.display = 'block';
        sb.innerText = I18N[lang].score(score, TOTAL);
        
        let ratio = score / TOTAL;
        sb.style.borderColor = ratio >= 0.8 ? varColor('success') : (ratio >= 0.6 ? '#f59e0b' : varColor('error'));
        sb.style.color = sb.style.borderColor;
        sb.style.background = ratio >= 0.8 ? 'rgba(16,185,129,0.1)' : (ratio >= 0.6 ? 'rgba(245,158,11,0.1)' : 'rgba(239,68,68,0.1)');
        
        current = 0;
        renderQuiz();
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(`--${name}`).trim(); }
</script>
</body>
</html>
