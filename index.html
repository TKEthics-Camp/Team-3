<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gongxing Academy - 智能学习系统</title>
  <style>
    :root{--primary:#4e8cff;--english:#8b5cf6;--science:#10b981;--success:#10b981;--error:#ef4444;--warning:#f59e0b;--page:#0f1115;--card:#181a20;--input:#23262f;--border:#2e323a;--text:#f3f4f6;--muted:#9ca3af;--gold:#ffd700}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:24px;background:var(--page);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:820px;margin:auto;padding:36px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 30px #0006}.header{display:flex;justify-content:space-between;gap:16px;align-items:center;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:22px}.brand{font-size:1.7rem;color:var(--primary);font-weight:700;cursor:pointer}.brand small{font-size:1rem;color:var(--muted);font-weight:400}.lang{display:flex;padding:4px;border-radius:8px;background:var(--input)}button{border:0;border-radius:8px;padding:12px 20px;background:var(--primary);color:#fff;font-weight:700;font-size:1rem;cursor:pointer;transition:.2s}button:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}button:disabled{opacity:.45;cursor:not-allowed}.lang button{padding:6px 14px;background:transparent;color:var(--muted)}.lang button.active{background:var(--primary);color:#fff}.dashboard,.quiz{padding:20px;border-radius:12px;border:1px solid var(--border);background:linear-gradient(145deg,#1e222d,var(--card))}.stats{display:flex;text-align:center;gap:12px}.stat{flex:1}.value{display:block;font-size:1.7rem;font-weight:800;color:var(--primary)}.label{font-size:.9rem;color:var(--muted)}.badges{border-top:1px dashed var(--border);margin-top:16px;padding-top:16px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.badge{padding:6px 11px;border-radius:99px;border:1px solid #4e8cff55;background:#4e8cff1a;color:#78a8ff;font-size:.85rem;font-weight:700}.badge.gold{color:var(--gold);border-color:#ffd70055;background:#ffd7001a}.title{text-align:center;margin:28px 0 8px}.subtitle{text-align:center;color:var(--muted);margin:0 0 20px}.subjects{display:flex;gap:18px}.subject{flex:1;padding:36px 10px;background:var(--input);border:2px solid transparent;border-radius:12px;text-align:center;cursor:pointer;transition:.2s}.subject:hover{transform:translateY(-4px);border-color:var(--primary)}.icon{font-size:2.6rem}.subject strong{display:block;margin-top:12px;font-size:1.2rem}.setup{display:flex;gap:14px}select{flex:1;padding:13px 15px;border-radius:8px;background:var(--input);border:1px solid var(--border);color:var(--text);font-size:1rem}.dots{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin:0 0 22px}.dot{width:13px;height:13px;border-radius:50%;background:var(--border);cursor:pointer}.dot.active{background:var(--primary);transform:scale(1.2)}.dot.answered{box-shadow:0 0 0 2px #fff3}.dot.correct{background:var(--success)}.dot.wrong{background:var(--error)}.quiz{text-align:center;border:2px solid transparent}.quiz.correct{border-color:var(--success);background:#10b98110}.quiz.wrong{border-color:var(--error);background:#ef444410}.qsub{color:var(--muted);margin-bottom:16px}.question{font-size:1.45rem;font-weight:650;line-height:1.45;margin-bottom:24px}.passage{text-align:left;padding:16px;background:var(--card);border-left:4px solid var(--english);border-radius:8px;line-height:1.65;margin-bottom:22px}.answer{width:280px;max-width:100%;padding:14px;text-align:center;font-size:1.3rem;border-radius:8px;border:2px solid var(--border);background:var(--card);color:var(--text)}.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}.choice{background:var(--card);border:2px solid var(--border);color:var(--text);font-weight:500}.choice.selected{background:var(--primary);border-color:var(--primary)}.choice.good{background:var(--success);border-color:var(--success)}.choice.bad{background:var(--error);border-color:var(--error)}.choice.missed{color:var(--success);border-color:var(--success);background:transparent;border-style:dashed}.feedback{margin-top:18px;font-weight:700}.feedback.good{color:var(--success)}.feedback.bad{color:var(--error)}.nav{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:22px}.outline{background:transparent;color:var(--text);border:1px solid var(--border)}.score{display:none;padding:16px;border:1px solid;border-radius:12px;text-align:center;font-size:1.2rem;font-weight:800;margin-bottom:18px}.error{display:none;margin-bottom:16px;border:1px solid #ef444477;background:#ef44441a;color:#fecaca;padding:13px;border-radius:8px;line-height:1.5}@media(max-width:620px){body{padding:12px}.app{padding:22px}.header{align-items:flex-start;flex-direction:column}.subjects,.setup,.stats{flex-direction:column}.choices{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <header class="header"><div class="brand" onclick="goHome()">⚡ Gongxing Academy <small id="crumb"></small></div><div class="lang"><button id="en" onclick="setLang('en')">EN</button><button id="zh" class="active" onclick="setLang('zh')">中文</button></div></header>
    <div id="error" class="error"></div>
    <section id="home"><div class="dashboard"><div class="stats"><div class="stat"><span class="value" id="today">0</span><span class="label" id="todayLabel">今日已刷(题)</span></div><div class="stat"><span class="value" id="accuracy">0%</span><span class="label" id="accuracyLabel">平均正确率</span></div><div class="stat"><span class="value" style="color:var(--warning)" id="streak">0</span><span class="label" id="streakLabel">连续打卡(天) 🔥</span></div></div><div class="badges" id="badges"></div></div><h2 class="title" id="homeTitle">请选择测试科目</h2><p class="subtitle" id="homeSubtitle">题库已独立为 JSON 文件，方便以后扩展。</p><div class="subjects"><div class="subject" onclick="selectSubject('math')"><div class="icon">📐</div><strong id="mathTitle">数学 (Math)</strong></div><div class="subject" onclick="selectSubject('english')"><div class="icon">📝</div><strong id="englishTitle">英语 (English)</strong></div><div class="subject" onclick="selectSubject('science')"><div class="icon">🔬</div><strong id="scienceTitle">科学 (Science)</strong></div></div></section>
    <section id="setup" hidden><div class="setup"><select id="levels"></select><button id="start" onclick="startQuiz()">开始刷题</button></div><p class="subtitle" id="setupNote">每次抽取 10 题；题量不足时会安全循环抽取。</p></section>
    <section id="quizView" hidden><div id="score" class="score"></div><div id="dots" class="dots"></div><div id="quiz" class="quiz"><div id="content"></div></div><div class="nav"><button class="outline" id="prev" onclick="nav(-1)">上一题</button><button id="next" onclick="nav(1)">下一题</button><button id="submit" style="background:var(--success)" onclick="submitQuiz()">提交批改</button></div></section>
  </main>
<script>
const TOTAL=10, EPS=.001; let lang='zh',subject='none',questions=[],answers=[],current=0,graded=false; const banks={math:null,english:null,science:null};
const T={zh:{home:'请选择测试科目',sub:'题库已独立为 JSON 文件，方便以后扩展。',math:'数学 (Math)',english:'英语 (English)',science:'科学 (Science)',start:'开始刷题',prev:'上一题',next:'下一题',submit:'提交批改',today:'今日已刷(题)',accuracy:'平均正确率',streak:'连续打卡(天) 🔥',note:'每次抽取 10 题；题量不足时会安全循环抽取。',placeholder:'输入答案',correct:'✔️ 回答正确！',wrong:a=>`❌ 回答错误。正确答案：${a}`,empty:a=>`⚠️ 未作答。正确答案：${a}`,score:(c,n)=>`测试完成！答对 ${c} 题，共 ${n} 题 🔥 数据已保存！`,types:{number:'请输入数字答案：',meaning:'选出下列单词的正确词义：',synonym:'选出最接近的近义词：',grammar:'选择正确的选项填空：',reading:'阅读理解：根据短文回答问题。',mc:'选择正确的答案：'}},en:{home:'Select Subject',sub:'Question banks are JSON files, ready for future expansion.',math:'Mathematics',english:'English',science:'Science',start:'Start Quiz',prev:'Previous',next:'Next',submit:'Submit & Grade',today:'Today Solved',accuracy:'Average Accuracy',streak:'Streak (days) 🔥',note:'Each quiz selects 10 questions. Smaller banks repeat safely.',placeholder:'Enter answer',correct:'✔️ Correct!',wrong:a=>`❌ Wrong. Correct answer: ${a}`,empty:a=>`⚠️ No answer. Correct answer: ${a}`,score:(c,n)=>`Quiz completed! Score: ${c} / ${n} 🔥 Stats saved!`,types:{number:'Enter the numeric answer:',meaning:'Choose the correct meaning:',synonym:'Choose the closest synonym:',grammar:'Choose the correct word:',reading:'Read the passage and answer:',mc:'Choose the correct answer:'}}};
let user={totalSolved:0,totalCorrect:0,todaySolved:0,lastDate:'',streak:0,mastery:{math:0,english:0,science:0},wrongBook:[]};
const tx=x=>typeof x==='object'?(x[lang]||x.zh||x.en||''):String(x??''); const clone=x=>JSON.parse(JSON.stringify(x)); const shuffle=a=>[...a].sort(()=>Math.random()-.5);
function error(message=''){const e=document.querySelector('#error');e.textContent=message;e.style.display=message?'block':'none'}
async function init(){try{const r=await Promise.all(['math','english','science'].map(async s=>{const x=await fetch(`./data/${s}.json`);if(!x.ok)throw Error(x.status);return [s,await x.json()]}));r.forEach(([s,b])=>banks[s]=b)}catch(e){error('题库加载失败。请确认 data/math.json、data/english.json、data/science.json 均存在，并通过本地服务器打开本页。');document.querySelector('#start').disabled=true}loadUser();setLang('zh')}
function loadUser(){try{const s=localStorage.getItem('gongxing_academy_data');if(s)user={...user,...JSON.parse(s),mastery:{...user.mastery,...JSON.parse(s).mastery}}}catch{}const today=new Date().toLocaleDateString(),y=new Date();y.setDate(y.getDate()-1);if(user.lastDate!==today){if(user.lastDate&&user.lastDate!==y.toLocaleDateString())user.streak=0;user.todaySolved=0}updateDash()}
function saveUser(){localStorage.setItem('gongxing_academy_data',JSON.stringify(user))}
function updateDash(){today.textContent=user.todaySolved;accuracy.textContent=(user.totalSolved?Math.round(user.totalCorrect/user.totalSolved*100):0)+'%';streak.textContent=user.streak;let b=user.totalSolved>=200?'👑 传奇学神':user.totalSolved>=100?'💎 钻石学霸':user.totalSolved>=30?'🥇 黄金写手':user.totalSolved>=10?'🥈 白银门徒':'🥉 青铜萌新';badges.innerHTML=`<span class="badge">${b}</span>${user.mastery.math>=20?'<span class="badge gold">📐 数学极客</span>':''}${user.mastery.english>=20?'<span class="badge gold">📝 词汇达人</span>':''}${user.mastery.science>=20?'<span class="badge gold">🌌 科学新星</span>':''}${user.streak>=3?'<span class="badge gold">🔥 坚持不懈</span>':''}`}
function setLang(l){lang=l;document.documentElement.lang=l==='zh'?'zh-CN':'en';en.className=l==='en'?'active':'';zh.className=l==='zh'?'active':'';homeTitle.textContent=T[l].home;homeSubtitle.textContent=T[l].sub;mathTitle.textContent=T[l].math;englishTitle.textContent=T[l].english;scienceTitle.textContent=T[l].science;start.textContent=T[l].start;prev.textContent=T[l].prev;next.textContent=T[l].next;submit.textContent=T[l].submit;todayLabel.textContent=T[l].today;accuracyLabel.textContent=T[l].accuracy;streakLabel.textContent=T[l].streak;setupNote.textContent=T[l].note;if(subject!=='none'){crumb.textContent='> '+T[l][subject];populate()}if(questions.length)render()}
function goHome(){home.hidden=false;setup.hidden=true;quizView.hidden=true;subject='none';questions=[];crumb.textContent='';document.body.className='';updateDash()}
function selectSubject(s){if(!banks[s])return error('题库尚未加载完成。');subject=s;home.hidden=true;setup.hidden=false;quizView.hidden=true;crumb.textContent='> '+T[lang][s];populate()}
function populate(){levels.innerHTML='';banks[subject].levels.forEach(l=>{const o=document.createElement('option');o.value=l.id;o.textContent=tx(l.name);levels.append(o)})}
function startQuiz(){const level=banks[subject].levels.find(l=>l.id===levels.value);if(!level?.questions?.length)return error(lang==='zh'?'当前等级没有题目。':'No questions found for this level.');questions=Array.from({length:TOTAL},(_,i)=>{const q=clone(shuffle(level.questions)[i%level.questions.length]);q.levelId=level.id;if(q.type!=='number'){const a=shuffle(q.options.map((o,n)=>({o,ok:n===q.answer})));q.options=a.map(x=>x.o);q.answer=a.findIndex(x=>x.ok)}return q});answers=Array(TOTAL).fill(null);current=0;graded=false;setup.hidden=true;quizView.hidden=false;score.style.display='none';dots.innerHTML=questions.map((_,i)=>`<i class="dot" onclick="jump(${i})"></i>`).join('');render()}
function render(){const q=questions[current];document.querySelectorAll('.dot').forEach((d,i)=>d.className=`dot ${i===current?'active':''} ${!graded&&answers[i]!==null?'answered':''} ${graded?(correct(i)?'correct':'wrong'):''}`);prev.disabled=current===0;next.style.display=current===TOTAL-1?'none':'';submit.style.display=!graded&&current===TOTAL-1?'':'none';if(graded&&current===TOTAL-1)next.style.display='none';let h='';if(q.type==='number'){h=`<p class="qsub">${T[lang].types.number}</p><div class="question">${esc(tx(q.question))}</div><input class="answer" type="number" step="any" placeholder="${T[lang].placeholder}" value="${answers[current]??''}" oninput="save(this.value)" ${graded?'disabled':''}>`}else{h=`<p class="qsub">${T[lang].types[q.type]||T[lang].types.mc}</p>${q.type==='reading'?`<div class="passage">${esc(tx(q.passage))}</div>`:''}<div class="question">${esc(tx(q.question))}</div><div class="choices">${q.options.map((o,i)=>`<button class="choice ${answers[current]===i?'selected':''} ${graded?(i===q.answer&&answers[current]===i?'good':answers[current]===i?'bad':i===q.answer?'missed':''):''}" onclick="save(${i})" ${graded?'disabled':''}>${esc(tx(o))}</button>`).join('')}</div>`}if(graded){const ok=correct(current),ans=q.type==='number'?q.answer:tx(q.options[q.answer]);h+=`<p class="feedback ${ok?'good':'bad'}">${esc(answers[current]===null?T[lang].empty(ans):ok?T[lang].correct:T[lang].wrong(ans))}</p>`;quiz.className='quiz '+(ok?'correct':'wrong')}else quiz.className='quiz';content.innerHTML=h}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function save(v){if(graded)return;answers[current]=questions[current].type==='number'?(v===''?null:Number(v)):v;render()}function nav(n){current+=n;render()}function jump(i){current=i;render()}function correct(i){const q=questions[i],a=answers[i];return a!==null&&(q.type==='number'?Math.abs(a-q.answer)<EPS:Number(a)===Number(q.answer))}
function submitQuiz(){if(!confirm(lang==='zh'?'确定要提交并批改吗？':'Submit and grade now?'))return;graded=true;const n=questions.filter((_,i)=>correct(i)).length,todayDate=new Date().toLocaleDateString();if(user.lastDate!==todayDate){user.streak++;user.lastDate=todayDate}user.todaySolved+=TOTAL;user.totalSolved+=TOTAL;user.totalCorrect+=n;user.mastery[subject]+=n;questions.forEach((q,i)=>{if(!correct(i))user.wrongBook.push({questionId:q.id,subject,level:q.levelId,date:new Date().toISOString()})});saveUser();updateDash();const r=n/TOTAL;score.style.display='block';score.textContent=T[lang].score(n,TOTAL);score.style.color=r>=.8?'var(--success)':r>=.6?'var(--warning)':'var(--error)';score.style.borderColor=score.style.color;score.style.background=r>=.8?'#10b9811a':r>=.6?'#f59e0b1a':'#ef44441a';current=0;render()}
init();
</script>
</body>
</html>
