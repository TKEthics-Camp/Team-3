  <main class="app">

    <section id="setup" hidden><div class="setup"><select id="levels"></select><button id="start" onclick="startQuiz()">开始刷题</button></div><p class="subtitle" id="setupNote">每次最多随机抽取 5 道不重复题目；题量不足时按实际题数测试。</p></section>

function selectBalanced(pool,count,previous){
  const fresh=shuffle(pool.filter(q=>!previous.has(q.id))), seen=shuffle(pool.filter(q=>previous.has(q.id)));
  const source=[...fresh,...seen], chosen=[], used=new Set(), usedTopics=new Set(), usedTypes=new Set();

    const topic=tx(q.knowledge)||'general', type=q.type||'general';
    if(prefer==='type'&&usedTypes.has(type))continue;
    if(prefer==='knowledge'&&usedTopics.has(topic))continue;

}

function renderExchange(){
  refreshPointBalance();const zhMode=lang==='zh',session=readGameSession();
  exchangeTitle.textContent=zhMode?'兑换游戏时间':'Redeem Game Time';exchangeCopy.textContent=zhMode?'每 5 积分可兑换 1 分钟，本次最多兑换 15 分钟。':'Redeem 1 minute for every 5 points, up to 15 minutes per session.';exchangeBalanceLabel.textContent=zhMode?'当前积分':'Point balance';exchangePointUnit.textContent=zhMode?'积分':'points';exchangeMinutesLabel.textContent=zhMode?'兑换时长':'Play time';exchangeCostUnit.textContent=zhMode?'积分':'points';exchangeAction.textContent=zhMode?'兑换并进入游戏':'Redeem & Enter Arcade';exchangeNote.textContent=zhMode?'答对 1 题获得 1 积分；5 题全对额外奖励 1 积分。倒计时结束后将自动返回刷题页面。':'Earn 1 point per correct answer, plus 1 bonus point for a perfect 5/5. When time expires, you will return to the learning page.';exchangePoints.textContent=user.points;
  if(session){exchangePurchase.hidden=true;exchangeActive.hidden=false;exchangeActive.innerHTML=`${zhMode?'已有游戏时间：':'Active play time: '}<strong>${formatGameTime(session.expiresAt-Date.now())}</strong><br><button class="exchange-action" style="margin-top:12px" onclick="location.href='games.html'">${zhMode?'继续游戏':'Continue Playing'}</button>`;return}
  exchangePurchase.hidden=false;exchangeActive.hidden=true;const max=Math.min(MAX_GAME_MINUTES,Math.floor(user.points/GAME_POINT_COST));exchangeMinutes.innerHTML=max?Array.from({length:max},(_,i)=>`<option value="${i+1}">${i+1} ${zhMode?'分钟':i===0?'minute':'minutes'}</option>`).join(''):`<option value="0">${zhMode?'积分不足':'Not enough points'}</option>`;exchangeAction.disabled=max===0;updateExchangeCost()
}
function updateExchangeCost(){exchangeCost.textContent=(Number(exchangeMinutes.value)||0)*GAME_POINT_COST}
async function redeemGameTime(){
  if(redemptionInProgress)return;redemptionInProgress=true;exchangeAction.disabled=true;
  const perform=()=>{if(readGameSession()){location.href='games.html';return}const minutes=Number(exchangeMinutes.value);if(!Number.isInteger(minutes)||minutes<1||minutes>MAX_GAME_MINUTES){redemptionInProgress=false;renderExchange();return}const cost=minutes*GAME_POINT_COST;let latest;try{latest=JSON.parse(localStorage.getItem('gongxing_academy_data')||'{}')}catch{redemptionInProgress=false;renderExchange();return}const balance=Math.max(0,Math.floor(Number(latest.points)||0));if(balance<cost){user.points=balance;redemptionInProgress=false;renderExchange();return}const now=Date.now();latest.points=balance-cost;localStorage.setItem('gongxing_academy_data',JSON.stringify(latest));user.points=latest.points;localStorage.setItem(GAME_SESSION_KEY,JSON.stringify({version:1,issuedAt:now,expiresAt:now+minutes*60000,minutes,cost,nonce:crypto.randomUUID?.()||String(now)+Math.random()}));location.href='games.html'};
  if(navigator.locks)await navigator.locks.request('gongxing-points',perform);else perform()
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!exchangeModal.hidden)closeExchange()});exchangeModal.addEventListener('click',e=>{if(e.target===exchangeModal)closeExchange()});
document.querySelector('.subjects').insertAdjacentHTML('afterend','<button class="game-entry" type="button" onclick="openExchange()"><span class="game-entry-copy"><span class="game-entry-icon">🎮</span><span><span class="game-entry-title" id="gameEntryTitle">游戏中心</span><span class="game-entry-sub" id="gameEntrySub">六款独立小游戏 · 兑换时间后畅玩</span><span class="points-pill">✦ <span id="gamePointBalance">0</span> <span id="gamePointUnit">积分</span></span></span></span><span class="game-entry-arrow">→</span></button>');
init();
</script>
</body>
</html>
