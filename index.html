<script>

T.zh.note='每次最多随机抽取 5 道不重复题目；题量不足时按实际题数测试。';T.en.note='Each quiz selects up to 5 unique questions. Smaller banks use their available question count.';

{id:'fifty_solved',icon:'🥈',zh:'白银探索者',en:'Silver Explorer',zhDesc:'累计完成 50 题',enDesc:'Solve 50 questions',test:u=>u.totalSolved>=50},
{id:'hundred_solved',icon:'🥇',zh:'黄金学者',en:'Golden Scholar',zhDesc:'累计完成 100 题',enDesc:'Solve 100 questions',test:u=>u.totalSolved>=100},

{id:'streak_7',icon:'⚡',zh:'一周连胜',en:'Week Warrior',zhDesc:'连续学习 7 天',enDesc:'Maintain a 7-day streak',test:u=>u.streak>=7},

let wushuang=false; let user={totalSolved:0,totalCorrect:0,todaySolved:0,lastDate:'',streak:0,mastery:{math:0,english:0,science:0},wrongBook:[],quizCount:0,perfectQuizzes:0,unlockedAchievements:[],equippedTitle:''};
const tx=x=>typeof x==='object'?(x[lang]||x.zh||x.en||''):String(x??''); const clone=x=>JSON.parse(JSON.stringify(x)); const shuffle=a=>[...a].sort(()=>Math.random()-.5);
function error(message=''){const e=document.querySelector('#error');e.textContent=message;e.style.display=message?'block':'none'}
async function init(){try{const r=await Promise.all(['math','english','science'].map(async s=>{const x=await fetch(`./data/${s}.json`);if(!x.ok)throw Error(x.status);return [s,await x.json()]}));r.forEach(([s,b])=>banks[s]=b)}catch(e){error('题库加载失败。请确认 data/math.json、data/english.json、data/science.json 均存在，并通过本地服务器打开本页。');document.querySelector('#start').disabled=true}loadUser();setLang('zh')}
function loadUser(){try{const s=localStorage.getItem('gongxing_academy_data');if(s){const saved=JSON.parse(s);user={...user,...saved,mastery:{...user.mastery,...(saved.mastery||{})},wrongBook:saved.wrongBook||[],unlockedAchievements:saved.unlockedAchievements||[]}}}catch{}const todayDate=new Date().toLocaleDateString(),y=new Date();y.setDate(y.getDate()-1);if(user.lastDate!==todayDate){if(user.lastDate&&user.lastDate!==y.toLocaleDateString())user.streak=0;user.todaySolved=0}updateDash()}
function saveUser(){localStorage.setItem('gongxing_academy_data',JSON.stringify(user))}
function updateDash(){today.textContent=user.todaySolved;accuracy.textContent=(user.totalSolved?Math.round(user.totalCorrect/user.totalSolved*100):0)+'%';streak.textContent=user.streak;unlockAchievements();renderAchievements()}
function unlockAchievements(){let changed=false;for(const achievement of ACHIEVEMENTS){if(achievement.test(user)&&!user.unlockedAchievements.includes(achievement.id)){user.unlockedAchievements.push(achievement.id);changed=true}}if(changed)saveUser()}
function achievementText(achievement,key){return lang==='zh'?achievement[key]:achievement[key==='zh'?'en':'enDesc']}
function renderAchievements(){const unlocked=new Set(user.unlockedAchievements),equipped=ACHIEVEMENTS.find(a=>a.id===user.equippedTitle&&unlocked.has(a.id));equippedTitle.textContent=equipped?`${equipped.icon} ${lang==='zh'?equipped.zh:equipped.en}`:(lang==='zh'?'未装备称号':'No title equipped');badges.innerHTML=`<span class="badge gold">🏆 ${lang==='zh'?'已解锁':'Unlocked'} ${unlocked.size}/${ACHIEVEMENTS.length}</span>`;achievementHeading.textContent=lang==='zh'?'🏆 Titles / 成就':'🏆 Titles / Achievements';achievementSummary.textContent=lang==='zh'?`点击已解锁的成就即可装备称号（${unlocked.size}/${ACHIEVEMENTS.length}）`:`Select an unlocked achievement to equip its title (${unlocked.size}/${ACHIEVEMENTS.length})`;achievementGrid.innerHTML=ACHIEVEMENTS.map(a=>{const isUnlocked=unlocked.has(a.id),isEquipped=user.equippedTitle===a.id;return `<button class="achievement-card ${isUnlocked?'':'locked'} ${isEquipped?'equipped':''}" onclick="equipAchievement('${a.id}')" ${isUnlocked?'':'disabled'}><span class="achievement-icon">${isUnlocked?a.icon:'🔒'}</span><span class="achievement-copy"><span class="achievement-name">${esc(lang==='zh'?a.zh:a.en)}</span><span class="achievement-desc">${esc(lang==='zh'?a.zhDesc:a.enDesc)}</span><span class="achievement-state">${isEquipped?(lang==='zh'?'已装备':'Equipped'):isUnlocked?(lang==='zh'?'点击装备':'Click to equip'):(lang==='zh'?'尚未解锁':'Locked')}</span></span></button>`}).join('')}
function equipAchievement(id){if(!user.unlockedAchievements.includes(id))return;user.equippedTitle=user.equippedTitle===id?'':id;saveUser();renderAchievements()}
function toggleAchievements(){achievementPanel.hidden=!achievementPanel.hidden;achievementChevron.textContent=achievementPanel.hidden?'▾':'▴'}
function setLang(l){if(subject==='english'&&l!=='en')return;lang=l;document.documentElement.lang=l==='zh'?'zh-CN':'en';en.className=l==='en'?'active':'';zh.className=l==='zh'?'active':'';homeTitle.textContent=T[l].home;homeSubtitle.textContent=T[l].sub;mathTitle.textContent=T[l].math;englishTitle.textContent=T[l].english;scienceTitle.textContent=T[l].science;start.textContent=T[l].start;prev.textContent=T[l].prev;next.textContent=T[l].next;submit.textContent=T[l].submit;todayLabel.textContent=T[l].today;accuracyLabel.textContent=T[l].accuracy;streakLabel.textContent=T[l].streak;setupNote.textContent=T[l].note;if(typeof wushuangText!=='undefined')wushuangText.textContent=wushuang?(l==='zh'?'无双 · ON':'HARD · ON'):(l==='zh'?'无双':'HARD');if(subject!=='none'){crumb.textContent='> '+T[l][subject];populate()}if(questions.length)render();renderAchievements()}

function toggleWushuang(){wushuang=!wushuang;document.body.classList.toggle('wushuang',wushuang);wushuangToggle.classList.toggle('is-on',wushuang);wushuangToggle.setAttribute('aria-pressed',String(wushuang));wushuangText.textContent=wushuang?(lang==='zh'?'无双 · ON':'HARD · ON'):(lang==='zh'?'无双':'HARD');setupNote.textContent=wushuang?(lang==='zh'?'无双模式：竞赛难度 · 5 题 · 红色警戒':'HARD mode: contest difficulty · 5 questions · red alert'):T[lang].note}
function wu(id,type,zh,en,answer,knowledge,options){return{id,type,question:{zh,en},answer,knowledge,difficulty:5,...(options?{options:options.map(x=>({zh:x,en:x}))}:{})}}
function wushuangQuestions(level){const n=Number(level.id),p='wu_'+subject+'_'+n+'_';if(subject==='math'){if(n<4)return[wu(p+'1','number','计算：48 × 7 - 36 ÷ 4 + 19 = ?','Calculate 48 × 7 - 36 ÷ 4 + 19.',346,'多步运算'),wu(p+'2','number','长方形长 17 cm、宽 9 cm，面积与周长的和是多少？','A rectangle is 17 cm by 9 cm. Find area plus perimeter.',205,'几何综合'),wu(p+'3','number','有 18 盒，每盒 14 支笔，送出 37 支后还剩多少支？','18 boxes hold 14 pens each. After giving away 37, how many remain?',215,'应用题'),wu(p+'4','number','125 - 38 + 46 - 29 = ?','Calculate 125 - 38 + 46 - 29.',104,'数感'),wu(p+'5','number','27 × 8 - 19 × 6 = ?','Calculate 27 × 8 - 19 × 6.',102,'乘法综合')];if(n<7)return[wu(p+'1','number','解方程：7x - 19 = 156，x = ?','Solve 7x - 19 = 156.',25,'方程'),wu(p+'2','number','3/8 + 5/12 = ?（输入小数）','3/8 + 5/12 = ? (decimal)',19/24,'分数'),wu(p+'3','number','原价 250 元，先涨价 20% 再打八折，现价多少元？','A 250-yuan item rises 20%, then gets 20% off.',240,'百分数'),wu(p+'4','number','半径为 7 cm 的圆，取 π=3.14，面积是多少？','A circle has radius 7; use π=3.14.',153.86,'圆'),wu(p+'5','number','速度 54 km/h，行驶 2.5 小时后再行驶 18 km，总路程多少 km？','Travel 54 km/h for 2.5 h, then 18 km more.',153,'行程')];if(n<10)return[wu(p+'1','number','解方程：8(x - 3) = 136，x = ?','Solve 8(x - 3) = 136.',20,'代数'),wu(p+'2','number','函数 y = 4x² - 11，当 x=3 时，y=?','For y=4x²-11, find y at x=3.',25,'函数'),wu(p+'3','number','直角三角形两直角边为 9 和 12，斜边长度的平方是多少？','A right triangle has legs 9 and 12. What is c²?',225,'几何'),wu(p+'4','number','数据 7、10、13、16、19 的平均数是多少？','Find the mean of 7, 10, 13, 16, 19.',13,'统计'),wu(p+'5','number','计算：-24 + 17 × 4 - 13 = ?','Calculate -24 + 17 × 4 - 13.',31,'有理数')];return[wu(p+'1','number','f(x) = 3x² - 10x，求 f′(2)。','For f(x)=3x²-10x, find f′(2).',2,'导数'),wu(p+'2','number','矩阵 [[6,4],[5,3]] 的行列式是多少？','Find det([[6,4],[5,3]]).',-2,'矩阵'),wu(p+'3','number','等比数列首项 3，公比 4，第 4 项是多少？','Geometric sequence: first term 3, ratio 4. Find term 4.',192,'数列'),wu(p+'4','number','log₂(2^7) + 3 = ?','log₂(2^7) + 3 = ?',10,'对数'),wu(p+'5','number','从 12 个不同元素中选 2 个，有多少种组合？','How many combinations choose 2 from 12?',66,'组合')]}
if(subject==='science'){const topics=['变量控制','模型证据','系统反馈','能量守恒','科学论证'],good='需要设置对照组并控制变量后再解释结果。',bad=['一次现象足以证明结论永远成立。','不符合预期的数据应直接删除。','相关性一定等于因果关系。'];return topics.map((t,i)=>wu(p+(i+1),'mc','无双科学推理：研究“'+t+'”时，哪项结论最可靠？','Wushuang science reasoning: which conclusion is most reliable?',0,t,[good,...bad]))}
const words=[['corroborate','用证据证实'],['mitigate','减轻严重程度'],['perspicacious','有敏锐洞察力'],['inexorable','不可阻挡的']];return words.map((x,i)=>wu(p+(i+1),'meaning','无双词汇：'+x[0]+' 最接近哪项含义？','Wushuang vocabulary: '+x[0],0,'学术词汇',[x[1],'忽略证据','临时随意改变','完全无关'])).concat([wu(p+'5','reading','阅读：可靠论证必须由可核查证据支撑。哪项概括正确？','A sound argument rests on verifiable evidence. Which summary is correct?',0,'阅读推理',['可靠论证依赖可核查证据。','重复即可替代证据。','证据会削弱论证。','所有断言同样可靠。'])])}

function goHome(){home.hidden=false;setup.hidden=true;quizView.hidden=true;subject='none';questions=[];crumb.textContent='';wushuang=false;document.body.className='';langToggle.hidden=false;wushuangToggle.style.display='none';wushuangToggle.classList.remove('is-on');wushuangToggle.setAttribute('aria-pressed','false');wushuangText.textContent=lang==='zh'?'无双':'HARD';updateDash()}
function selectSubject(s){if(!banks[s])return error('题库尚未加载完成。');subject=s;wushuangToggle.style.display='flex';if(s==='english'){langToggle.hidden=true;setLang('en')}else langToggle.hidden=false;home.hidden=true;setup.hidden=false;quizView.hidden=true;crumb.textContent='> '+T[lang][s];populate()}
function populate(){setupNote.textContent=lang==='zh'?'每次最多随机抽取 5 道不重复题目；题量不足时按实际题数测试。':'Each quiz selects up to 5 unique questions. Smaller banks use their available question count.';levels.innerHTML='';banks[subject].levels.forEach(l=>{const o=document.createElement('option');o.value=l.id;o.textContent=tx(l.name);levels.append(o)})}
function questionKey(q){return JSON.stringify([q.type,q.question,q.passage,q.options]);}
function selectBalanced(pool,count,previous){
  const fresh=shuffle(pool.filter(q=>!previous.has(q.id))), seen=shuffle(pool.filter(q=>previous.has(q.id)));
  const source=[...fresh,...seen], chosen=[], used=new Set(), usedTopics=new Set(), usedTypes=new Set();
  for(const prefer of ['type','knowledge','any']) for(const q of source){
    if(chosen.length>=count||used.has(questionKey(q)))continue;
    const topic=q.knowledge||'general', type=q.type||'general';
    if(prefer==='type'&&usedTypes.has(type))continue;
    if(prefer==='knowledge'&&usedTopics.has(topic))continue;
    chosen.push(q);used.add(questionKey(q));usedTopics.add(topic);usedTypes.add(type);
  }
  return chosen;
}
function startQuiz(){const level=banks[subject].levels.find(l=>l.id===levels.value);if(!level?.questions?.length)return error(lang==='zh'?'当前等级没有题目。':'No questions found for this level.');if(wushuang){questions=wushuangQuestions(level)}else{const pool=[...new Map(level.questions.map(q=>[questionKey(q),q])).values()],count=Math.min(TOTAL,pool.length),key='gongxing_last_quiz:'+subject+':'+level.id,previous=new Set(JSON.parse(sessionStorage.getItem(key)||'[]'));questions=selectBalanced(pool,count,previous)}questions=questions.map(source=>{const q=clone(source);q.levelId=level.id;if(q.type!=='number'){const a=shuffle(q.options.map((o,n)=>({o,ok:n===q.answer})));q.options=a.map(x=>x.o);q.answer=a.findIndex(x=>x.ok)}return q});answers=Array(questions.length).fill(null);current=0;graded=false;setup.hidden=true;quizView.hidden=false;score.style.display='none';dots.innerHTML=questions.map((_,i)=>'<i class=\"dot\" onclick=\"jump('+i+')\"></i>').join('');render()}
function render(){const q=questions[current],lastIndex=questions.length-1;document.querySelectorAll('.dot').forEach((d,i)=>d.className=`dot ${i===current?'active':''} ${!graded&&answers[i]!==null?'answered':''} ${graded?(correct(i)?'correct':'wrong'):''}`);prev.disabled=current===0;next.style.display=current===lastIndex?'none':'';submit.style.display=!graded&&current===lastIndex?'':'none';if(graded&&current===lastIndex)next.style.display='none';let h='';if(q.type==='number'){h=`<p class="qsub">${T[lang].types.number}</p><div class="question">${esc(tx(q.question))}</div><input class="answer" type="number" step="any" placeholder="${T[lang].placeholder}" value="${answers[current]??''}" oninput="save(this.value)" ${graded?'disabled':''}>`}else{h=`<p class="qsub">${T[lang].types[q.type]||T[lang].types.mc}</p>${q.type==='reading'?`<div class="passage">${esc(tx(q.passage))}</div>`:''}<div class="question">${esc(tx(q.question))}</div><div class="choices">${q.options.map((o,i)=>`<button class="choice ${answers[current]===i?'selected':''} ${graded?(i===q.answer&&answers[current]===i?'good':answers[current]===i?'bad':i===q.answer?'missed':''):''}" onclick="save(${i})" ${graded?'disabled':''}>${esc(tx(o))}</button>`).join('')}</div>`}if(graded){const ok=correct(current),ans=q.type==='number'?q.answer:tx(q.options[q.answer]);h+=`<p class="feedback ${ok?'good':'bad'}">${esc(answers[current]===null?T[lang].empty(ans):ok?T[lang].correct:T[lang].wrong(ans))}</p>`;quiz.className='quiz '+(ok?'correct':'wrong')}else quiz.className='quiz';content.innerHTML=h}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function save(v){if(graded)return;const isNumber=questions[current].type==='number';answers[current]=isNumber?(v===''?null:Number(v)):v;if(!isNumber)render()}function nav(n){current+=n;render()}function jump(i){current=i;render()}function correct(i){const q=questions[i],a=answers[i];return a!==null&&(q.type==='number'?Math.abs(a-q.answer)<EPS:Number(a)===Number(q.answer))}
function submitQuiz(){if(!confirm(lang==='zh'?'确定要提交并批改吗？':'Submit and grade now?'))return;graded=true;const total=questions.length,n=questions.filter((_,i)=>correct(i)).length,todayDate=new Date().toLocaleDateString();if(user.lastDate!==todayDate){user.streak++;user.lastDate=todayDate}user.todaySolved+=total;user.totalSolved+=total;user.totalCorrect+=n;user.mastery[subject]+=n;user.quizCount+=1;if(n===total)user.perfectQuizzes+=1;questions.forEach((q,i)=>{if(!correct(i))user.wrongBook.push({questionId:q.id,subject,level:q.levelId,date:new Date().toISOString()})});saveUser();updateDash();const r=n/total;score.style.display='block';score.textContent=T[lang].score(n,total);score.style.color=r>=.8?'var(--success)':r>=.6?'var(--warning)':'var(--error)';score.style.borderColor=score.style.color;score.style.background=r>=.8?'#10b9811a':r>=.6?'#f59e0b1a':'#ef44441a';current=0;render()}
init();
</script>
