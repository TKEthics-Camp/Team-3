<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080b12">
  <title>无名游艺馆</title>
  <link rel="stylesheet" href="styles/games.css">
  <link rel="stylesheet" href="styles/touch-controls.css">
  <script src="src/games/access-gate.js"></script>
</head>
<body>
  <main class="shell">
    <header class="topbar"><a class="brand" href="index.html"><span class="brand-mark">◇</span> <span data-t="brand">无名游艺馆</span></a><div class="top-actions"><div class="session-chip">⏳ <span data-t="timeLeft">剩余时间</span> <strong id="playTimeTop">--:--</strong></div><div class="lang-switch"><button id="arcadeEn">英文</button><button id="arcadeZh" class="active">中文</button></div><a class="back" href="index.html" data-t="back">← 返回学苑</a></div></header>
    <section class="hero"><span class="eyebrow" data-t="eyebrow">独立游戏中心</span><h1 data-t="headline">八种玩法，随时开局。</h1><p data-t="intro">动作、反应、节奏、棋类与策略。最高分保存在本机；登录云端账号后可使用在线对战。</p><div class="hero-stats"><span class="pill" data-t="six">🎮 8 款完整游戏</span><span class="pill" data-t="modes">🤖 电脑 + 本地 + 在线对战</span><span class="pill" data-t="localBest">🏆 本地最高分</span></div></section>
    <section class="games" aria-label="游戏列表">
      <button class="game-card featured" data-game="stick" style="--accent:#ff5b7f"><span class="popular-badge" id="popularBadge">🔥 人气超高！</span><span class="game-icon">☀️⚔️🌙</span><h2 data-game-title="stick">火柴人格斗 · 光暗对决</h2><p data-game-desc="stick">选择光或暗的独立技能组；暗系可穿过敌人，并以红黑能量路径持续灼烧。</p><div class="game-meta"><span data-game-kind="stick">格斗 · 光 / 暗</span><span data-high="stick">最高 0</span></div></button>
      <button class="game-card" data-game="reaction" style="--accent:#35e884"><span class="game-icon">⚡👆</span><h2 data-game-title="reaction">反应力测试</h2><p data-game-desc="reaction">保持专注，等整个界面变绿后立刻点击，以毫秒测出你的真实反应速度。</p><div class="game-meta"><span data-game-kind="reaction">反应 · 单人</span><span data-high="reaction">最佳 —</span></div></button>
      <button class="game-card" data-game="gomoku" style="--accent:#e5b85a"><span class="game-icon">⚫⚪</span><h2 data-game-title="gomoku">曜石五子棋</h2><p data-game-desc="gomoku">传统金木棋盘与精致落子特效，挑战三档电脑对手，或与朋友同屏对弈。</p><div class="game-meta"><span data-game-kind="gomoku">棋类 · 电脑 / 双人</span><span data-high="gomoku">最高 0</span></div></button>
      <button class="game-card" data-game="rhythm" style="--accent:#9b6cff"><span class="game-icon">💠</span><h2 data-game-title="rhythm">反应堆节拍</h2><p data-game-desc="rhythm">守住四条能量轨道，在判定线捕获脉冲并维持连击。</p><div class="game-meta"><span data-game-kind="rhythm">节奏 · 反应</span><span data-high="rhythm">最高 0</span></div></button>
      <button class="game-card" data-game="pacman" style="--accent:#ffc857"><span class="game-icon">🟡👻</span><h2 data-game-title="pacman">吃豆人 · 经典迷宫</h2><p data-game-desc="pacman">穿过霓虹迷宫吃光豆子，利用能量豆反击四只各具个性的幽灵。</p><div class="game-meta"><span data-game-kind="pacman">迷宫 · 追逐</span><span data-high="pacman">最高 0</span></div></button>
      <button class="game-card" data-game="chess" style="--accent:#e7d7b5"><span class="game-icon">♔♚</span><h2 data-game-title="chess">国际象棋 · 白棋对黑棋</h2><p data-game-desc="chess">经典木纹棋盘与棋子滑行动画，挑战三档电脑对手，或与朋友同屏对弈。</p><div class="game-meta"><span data-game-kind="chess">棋类 · 电脑 / 双人</span><span data-high="chess">最高 0</span></div></button>
      <button class="game-card" data-game="battleship" style="--accent:#38bdf8"><span class="game-icon">⚓</span><h2 data-game-title="battleship">深空海战</h2><p data-game-desc="battleship">亲自部署五艘舰船，命中即可连续开火；支持三档电脑对手与隐私双人战。</p><div class="game-meta"><span data-game-kind="battleship">推理 · 电脑 / 双人</span><span data-high="battleship">最高 0</span></div></button>
      <button class="game-card" data-game="tag" style="--accent:#44ff88"><span class="game-icon">🏃‍♂️💨</span><h2 data-game-title="tag">3D 追逐战</h2><p data-game-desc="tag">在立体地图中奔跑、跳跃并追逐机器人，体验多种地图与追逐模式。</p><div class="game-meta"><span data-game-kind="tag">3D 动作 · 单机机器人</span><span>本地模式</span></div></button>
    </section>
  </main>
  <section class="arena" id="arena" hidden aria-modal="true" role="dialog">
    <div class="arena-shell"><header class="arena-head"><div class="arena-title"><h2 id="arenaTitle"></h2><p id="arenaDesc"></p></div><div class="arena-head-actions"><button class="fullscreen-toggle" id="fullscreenGame" type="button">⛶ <span>全屏</span></button><button class="close" id="closeGame" aria-label="关闭游戏">✕</button></div></header>
      <div class="hud"><div class="hud-item"><span class="hud-label" data-t="score">得分</span><span class="hud-value" id="scoreValue">0</span></div><div class="hud-item"><span class="hud-label" data-t="status">状态</span><span class="hud-value" id="statusValue">准备就绪</span></div><div class="hud-item"><span class="hud-label" data-t="best">最高</span><span class="hud-value" id="bestValue">0</span></div><div class="hud-item"><span class="hud-label" data-t="timeLeft">剩余时间</span><span class="hud-value hud-time" id="playTimeHud">--:--</span></div></div>
      <div class="stage" id="stage"><canvas id="gameCanvas" width="760" height="480"></canvas><div class="dom-game" id="domGame" hidden></div><div class="result" id="result" hidden><div class="result-card"><h3 id="resultTitle">本局结束</h3><p id="resultText"></p><button class="restart" id="resultRestart" data-t="playAgain">再玩一次</button></div></div></div>
      <footer class="arena-foot"><div class="help" id="helpText"></div><div class="touch-controls" id="touchControls"></div><button class="restart" id="restartGame" data-t="restart">重新开始</button></footer>
    </div>
  </section>
  <script src="src/config/remote.js"></script>
  <script src="src/shared/remote-client.js"></script>
  <script src="src/games/online.js"></script>
  <script src="src/games/core.js"></script>
  <script src="src/games/gomoku.js"></script>
  <script src="src/games/rhythm.js"></script>
  <script src="src/games/reaction.js"></script>
  <script src="src/games/pacman.js"></script>
  <script src="src/games/stick.js"></script>
  <script src="src/games/chess.js"></script>
  <script src="src/games/battleship.js"></script>
  <script src="src/games/tag.js"></script>
  <script src="src/games/lifecycle.js"></script>
</body>
</html>
